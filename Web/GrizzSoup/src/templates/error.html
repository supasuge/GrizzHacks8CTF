{% extends "base.html" %}
{% block content %}

<div class="card forest-card shadow-lg">
  <div class="card-body">
    <h1 class="h4">{{ title }}</h1>
    <p class="text-muted">{{ message }}</p>

    <div class="mt-2">
      <span class="badge text-bg-danger">status: {{ status }}</span>
    </div>

    <div class="mt-4">
      <a class="btn btn-outline-success" href="{{ url_for('index') }}">Back to the Grove</a>
    </div>
  </div>
</div>

{% endblock %}
